services:
  kundli:
    build: .
    container_name: kundli
    ports:
      - "8090:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATA_DIR=/srv/userdata
    volumes:
      - ./userdata:/srv/userdata   # saved profiles persist across rebuilds
    restart: unless-stopped

